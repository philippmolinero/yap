[hotkey]
keycode = 62                  # Right Control
keycodes = [61, 62]           # Right Option (MacBook) or Right Control (external)
double_tap_ms = 300

[transcription]
provider = "groq"
model = "whisper-large-v3-turbo"
sample_rate = 16000

[cleanup]
enabled = true
provider = "groq"
model = "llama-3.3-70b-versatile"

[paste]
delay_ms = 50

[silence]
timeout = 5.0               # seconds of silence before auto-stop (0 = disabled)
threshold = 0.008            # RMS level below this counts as silence
